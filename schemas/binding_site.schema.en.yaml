schema_name: binding_site
schema_version: 1.0
language: en

description: >
  These entity descriptions are created so that agent systems ("AI") and humans
  share the same understanding of sensitive real-world modeling objects. This schema
  defines one interpreted receptor binding site as a normalized entity linked to a
  receptor structure and, where relevant, to one or more ligand complex interpretations.

entity_definition:
  name: binding_site
  description: >
    A structured representation of one binding-site interpretation in one receptor/protein
    structure context. A record may describe an active site, orthosteric site, allosteric
    site, peripheral site, interface site, or another conservatively defined site region.
    The same biological site observed in different structures should normally be represented
    by separate binding_site records tied to each supporting structure context.

record_granularity:
  unit: one_binding_site_record
  description: >
    One record corresponds to one interpreted site in one receptor structure context,
    usually one chain-specific site within one deposited or registry-linked structure/model.
    Residue membership may vary between structures, constructs, or conformational states,
    so binding_site records should remain structure-specific.

naming_conventions:
  missing_value: null
  boolean_values: [true, false]
  list_format: array
  primary_id_example: "binding_site:4EY4:A:active_site"

field_groups:
  - identity
  - receptor_link
  - site_definition
  - residues
  - evidence
  - relations
  - references
  - curation

fields:
  - name: site_id
    type: string
    required: true
    description: Stable internal identifier for the binding_site entity.
    example: "binding_site:4EY4:A:active_site"

  - name: structure_registry
    type: string
    required: true
    description: Primary registry or source system that provides the supporting structure/model.
    allowed_values:
      - PDB
      - UniProt
      - AlphaFold
      - ModelArchive
      - EMDB
      - Other
    example: "PDB"

  - name: structure_id
    type: string
    required: true
    description: Primary identifier of the supporting structure/model in its source registry.
    example: "4EY4"

  - name: receptor_entity_id
    type: string
    required: true
    description: Identifier of the linked receptor_structure entity.
    example: "receptor_structure:4EY4"

  - name: gene_name
    type: string
    required: false
    description: Standard gene symbol of the receptor/protein, if available.
    example: "ACHE"

  - name: organism
    type: string
    required: false
    description: Source organism of the receptor/protein.
    example: "Homo sapiens"

  - name: auth_asym_id
    type: string
    required: false
    description: Author chain identifier for the chain-specific site context when applicable.
    example: "A"

  - name: site_label
    type: string
    required: false
    description: Short human-readable label for the site interpretation.
    example: "orthosteric active-site pocket"

  - name: site_type
    type: string
    required: true
    description: Main structural or functional class of the site.
    allowed_values:
      - active_site
      - orthosteric_site
      - allosteric_site
      - peripheral_site
      - interface_site
      - unknown

  - name: site_function
    type: string
    required: false
    description: Functional interpretation of the site in the current record.
    allowed_values:
      - catalytic
      - ligand_binding
      - mixed
      - unknown

  - name: supporting_ligand_codes
    type: array[string]
    required: false
    description: Ligand component codes that support the current site interpretation.

  - name: residue_members
    type: array[object]
    required: false
    description: Conservative set of residues considered part of the site in this structure context.
    item_schema:
      auth_comp_id: string
      auth_seq_id: integer
      auth_asym_id: string
    example:
      - auth_comp_id: "SER"
        auth_seq_id: 203
        auth_asym_id: "A"
      - auth_comp_id: "HIS"
        auth_seq_id: 447
        auth_asym_id: "A"

  - name: active_residue_members
    type: array[object]
    required: false
    description: Stricter subset of residue_members containing residues that can be justified as functionally central or catalytic.
    item_schema:
      auth_comp_id: string
      auth_seq_id: integer
      auth_asym_id: string
    example:
      - auth_comp_id: "SER"
        auth_seq_id: 203
        auth_asym_id: "A"

  - name: evidence_items
    type: array[object]
    required: false
    description: Evidence supporting the current site interpretation and residue membership.
    item_schema:
      evidence_type: string
      source_level: string
      description: string
    example:
      - evidence_type: "deposited_binding_site_annotation"
        source_level: "structure_file"
        description: "Residues listed in deposited struct_site annotation."
      - evidence_type: "ligand_interaction_feature"
        source_level: "rcsb_polymer_entity_instance"
        description: "Residues recovered from polymer entity instance ligand interaction features."

  - name: confidence_level
    type: string
    required: false
    description: Confidence in the current site interpretation and residue assignment.
    allowed_values:
      - high
      - medium
      - low
      - unknown

  - name: related_entities
    type: array[object]
    required: false
    description: Links from this binding site to other entities in the ontology or data model.
    item_schema:
      entity_type: string
      entity_id: string
      relation_type: string
      note: string
    example:
      - entity_type: "receptor_structure"
        entity_id: "receptor_structure:4EY4"
        relation_type: "derived_from_structure"
        note: "Parent receptor structure supporting this site interpretation."
      - entity_type: "ligand_complex"
        entity_id: "ligand_complex:4EY4_donepezil"
        relation_type: "maps_to_binding_site"
        note: "Donepezil complex mapped to the same site."

  - name: primary_reference
    type: string
    required: false
    description: DOI, PubMed ID, or short citation supporting the site interpretation.

  - name: source_url
    type: string
    required: false
    description: Canonical URL for the source registry page of the supporting structure/model.

  - name: notes
    type: string
    required: false
    description: Free-text curator note for important caveats, residue ambiguities, or evidence limitations.

interpretation_rules:
  - rule: structure_specificity
    text: >
      Do not collapse site records across multiple structures by default. Binding-site residue membership
      may differ between structures, constructs, ligand states, or conformational states, so each record
      should remain anchored to its supporting structure context.

  - rule: active_residue_conservatism
    text: >
      Do not promote all ligand-contacting residues to active_residue_members. active_residue_members is a
      stricter subset and should only include residues that are explicitly supported as functionally central,
      catalytic, or otherwise mechanistically privileged by trusted source data or conservative curation.

  - rule: evidence_priority
    text: >
      Prefer deposited binding-site annotations, explicit curated references, or direct residue-level source
      evidence over indirect ligand-contact proxies. If only ligand-contact or software-generated binding-site
      features are available, prefer site_function = ligand_binding or unknown rather than catalytic guessing.

  - rule: chain_specificity
    text: >
      Preserve auth_asym_id when the site is chain-specific. If the source does not support chain-specific
      assignment, leave auth_asym_id null rather than inventing a chain context.

  - rule: null_handling
    text: >
      If a field cannot be determined from trusted source data, set it to null rather than guessing.

output_template:
  format: json
  example:
    site_id: "binding_site:4EY4:A:active_site"
    structure_registry: "PDB"
    structure_id: "4EY4"
    receptor_entity_id: "receptor_structure:4EY4"
    gene_name: "ACHE"
    organism: "Homo sapiens"
    auth_asym_id: "A"
    site_label: "orthosteric active-site pocket"
    site_type: "active_site"
    site_function: "catalytic"
    supporting_ligand_codes: ["E20"]
    residue_members:
      - auth_comp_id: "TRP"
        auth_seq_id: 86
        auth_asym_id: "A"
      - auth_comp_id: "SER"
        auth_seq_id: 203
        auth_asym_id: "A"
      - auth_comp_id: "HIS"
        auth_seq_id: 447
        auth_asym_id: "A"
    active_residue_members:
      - auth_comp_id: "SER"
        auth_seq_id: 203
        auth_asym_id: "A"
      - auth_comp_id: "HIS"
        auth_seq_id: 447
        auth_asym_id: "A"
    evidence_items:
      - evidence_type: "deposited_binding_site_annotation"
        source_level: "structure_file"
        description: "Residues listed in deposited site annotation and curated as active-site members."
      - evidence_type: "literature_curation"
        source_level: "primary_reference"
        description: "Primary reference describes catalytic residues for the ligand-bound structure."
    confidence_level: "high"
    related_entities:
      - entity_type: "receptor_structure"
        entity_id: "receptor_structure:4EY4"
        relation_type: "derived_from_structure"
        note: "Parent receptor structure."
      - entity_type: "ligand_complex"
        entity_id: "ligand_complex:4EY4_donepezil"
        relation_type: "maps_to_binding_site"
        note: "Donepezil complex assigned to this site."
    primary_reference: "10.1074/jbc.M411101200"
    source_url: "https://www.rcsb.org/structure/4EY4"
    notes: "Residue_members includes contact residues; active_residue_members stores the stricter catalytic subset."

schema_name: ligand_complex
schema_version: 1.0
language: en

description: >
  These entity descriptions are created so that agent systems ("AI") and humans
  share the same understanding of the most sensitive objects in modeling the
  physical world and preserve strictness in how those objects are described.
  Such files are also useful when building a domain ontology. This schema defines
  a ligand-bound or ligand-related complex as a normalized entity linked to a receptor
  structure and suitable for structure-based analysis workflows.

entity_definition:
  name: ligand_complex
  description: >
    A structured representation of one receptor-ligand complex, inhibitor-bound state,
    substrate analog complex, reactivator complex, or other functionally relevant small-molecule
    association. One record may be derived from a PDB entry, a predicted model, or another trusted
    structural registry. The identifier set for the same complex may be extended in the future with
    linked variants from UniProt, AlphaFold, and other registries where appropriate.

record_granularity:
  unit: one_ligand_complex_record
  description: >
    One record corresponds to one receptor-ligand complex interpretation. If a single structure entry
    contains multiple relevant ligands or multiple distinct binding modes that need separate treatment,
    they may be represented as separate ligand_complex records.

naming_conventions:
  missing_value: null
  boolean_values: [true, false]
  list_format: array
  primary_id_example: "ligand_complex:4EY4_donepezil"

field_groups:
  - identity
  - receptor_link
  - ligand
  - binding
  - experiment
  - quality
  - relations
  - references
  - curation

fields:
  - name: complex_id
    type: string
    required: true
    description: Internal stable identifier for the ligand complex entity.
    example: "ligand_complex:4EY4_donepezil"

  - name: structure_registry
    type: string
    required: true
    description: Primary registry or source system that provides the parent structure/model.
    allowed_values:
      - PDB
      - UniProt
      - AlphaFold
      - ModelArchive
      - EMDB
      - Other

  - name: structure_id
    type: string
    required: true
    description: Primary identifier of the parent structure/model in its source registry.
    example: "4EY4"

  - name: external_ids
    type: array[object]
    required: false
    description: Cross-registry identifiers relevant to the same complex or its parent structure.
    item_schema:
      registry: string
      id: string
      relation: string

  - name: receptor_entity_id
    type: string
    required: true
    description: Identifier of the linked receptor_structure entity.
    example: "receptor_structure:4EY4"

  - name: receptor_name
    type: string
    required: true
    description: Canonical receptor/protein name.
    example: "Acetylcholinesterase"

  - name: gene_name
    type: string
    required: false
    description: Standard gene symbol of the receptor/protein.
    example: "ACHE"

  - name: organism
    type: string
    required: true
    description: Source organism of the receptor/protein.
    example: "Homo sapiens"

  - name: ligand_name
    type: string
    required: true
    description: Preferred name of the bound or associated ligand.
    example: "Donepezil"

  - name: ligand_registry_ids
    type: array[object]
    required: false
    description: Registry identifiers for the ligand.
    item_schema:
      registry: string
      id: string
      relation: string
    example:
      - registry: "PDB CCD"
        id: "E20"
        relation: "bound_component"
      - registry: "PubChem"
        id: "3152"
        relation: "chemical_reference"

  - name: ligand_role
    type: string
    required: true
    description: Functional role of the ligand in the complex.
    allowed_values:
      - inhibitor
      - substrate
      - substrate_analog
      - product
      - reactivator
      - cofactor
      - allosteric_modulator
      - probe
      - unknown

  - name: binding_mode
    type: string
    required: false
    description: General binding mode or mechanistic class.
    allowed_values:
      - covalent
      - noncovalent
      - mixed
      - transient
      - unknown

  - name: binding_site
    type: string
    required: false
    description: Main annotated binding site.
    allowed_values:
      - active_site
      - peripheral_site
      - allosteric_site
      - orthosteric_site
      - interface_site
      - multiple_sites
      - unknown

  - name: interacting_chains
    type: array[string]
    required: false
    description: Receptor chains participating in ligand recognition.

  - name: interacting_residues
    type: array[string]
    required: false
    description: Key residues reported or curated as directly involved in binding.
    example: ["SER203", "HIS447", "GLU334"]

  - name: covalent_modification
    type: boolean
    required: false
    description: Whether the ligand forms a covalent adduct with the receptor/protein.

  - name: aged_state
    type: boolean
    required: false
    description: Whether the covalent inhibited complex is in an aged state.

  - name: affinity_type
    type: string
    required: false
    description: Type of affinity or activity metric if available.
    allowed_values:
      - Ki
      - Kd
      - IC50
      - EC50
      - kon
      - koff
      - unknown

  - name: affinity_value
    type: number
    required: false
    description: Numeric affinity/activity value if available.

  - name: affinity_units
    type: string
    required: false
    description: Units for the affinity/activity value.
    example: "nM"

  - name: experimental_method
    type: string
    required: false
    description: Experimental method used for the parent structure/model if applicable.

  - name: resolution_angstrom
    type: number
    required: false
    units: angstrom
    description: Best reported experimental resolution in angstroms.

  - name: confidence_note
    type: string
    required: false
    description: Note on confidence in the ligand pose, annotation, or binding assignment.

  - name: related_entities
    type: array[object]
    required: false
    description: Links from this ligand complex to other entities in the ontology or data model.
    item_schema:
      entity_type: string
      entity_id: string
      relation_type: string
      note: string
    example:
      - entity_type: "receptor_structure"
        entity_id: "receptor_structure:4EY4"
        relation_type: "derived_from_structure"
        note: "Parent human ACHE structure."

  - name: primary_reference
    type: string
    required: false
    description: DOI, PubMed ID, or short citation for the primary publication.

  - name: source_url
    type: string
    required: false
    description: Canonical URL for the source registry page of the parent structure/model.

  - name: notes
    type: string
    required: false
    description: Free-text curator note for important caveats or decisions.

interpretation_rules:
  - rule: registry_scope
    text: >
      Do not assume that complex provenance is limited to PDB entries. Complexes may be linked
      to experimentally determined structures, predicted models, or future registry integrations.
      Preserve the primary source in structure_registry and use external_ids for cross-references.

  - rule: ligand_relevance
    text: >
      Include only functionally relevant ligands in ligand_complex records. Ignore salts, buffers,
      cryoprotectants, detergents, and other non-functional additives unless they are the explicit
      subject of the complex interpretation.

  - rule: one_record_per_interpretation
    text: >
      If a structure contains multiple relevant ligands with distinct roles, or one ligand has multiple
      independently important binding interpretations, represent them as separate ligand_complex records.

  - rule: interacting_residues_scope
    text: >
      Treat interacting_residues as the conservative contact-oriented residue list for this ligand_complex
      interpretation. Do not automatically promote all interacting_residues to catalytic or active residues.
      If a stricter residue-level site interpretation is needed, represent it through a linked binding_site entity.

  - rule: null_handling
    text: >
      If a field cannot be determined from trusted source data, set it to null rather than guessing.

output_template:
  format: json
  example:
    complex_id: "ligand_complex:4EY4_donepezil"
    structure_registry: "PDB"
    structure_id: "4EY4"
    external_ids:
      - registry: "PDB"
        id: "4EY4"
        relation: "parent_structure"
    receptor_entity_id: "receptor_structure:4EY4"
    receptor_name: "Acetylcholinesterase"
    gene_name: "ACHE"
    organism: "Homo sapiens"
    ligand_name: "Donepezil"
    ligand_registry_ids:
      - registry: "PubChem"
        id: "3152"
        relation: "chemical_reference"
    ligand_role: "inhibitor"
    binding_mode: "noncovalent"
    binding_site: "active_site"
    interacting_chains: ["A"]
    interacting_residues: ["SER203", "TRP86", "TYR337"]
    covalent_modification: false
    aged_state: false
    affinity_type: null
    affinity_value: null
    affinity_units: null
    experimental_method: "X-RAY DIFFRACTION"
    resolution_angstrom: 2.35
    confidence_note: "High confidence crystallographic ligand pose."
    related_entities:
      - entity_type: "receptor_structure"
        entity_id: "receptor_structure:4EY4"
        relation_type: "derived_from_structure"
        note: "Parent receptor structure."
      - entity_type: "binding_site"
        entity_id: "binding_site:4EY4:A:active_site"
        relation_type: "maps_to_binding_site"
        note: "Ligand complex mapped to the active-site pocket binding_site record."
    primary_reference: null
    source_url: "https://www.rcsb.org/structure/4EY4"
    notes: "Human ACHE complex with donepezil."

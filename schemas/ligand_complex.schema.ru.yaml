schema_name: ligand_complex
schema_version: 1.0
language: ru

description: >
  Эти описания сущностей создаются для того, чтобы агентные системы ("ИИ") и человек
  имели общее понимание наиболее чувствительных объектов при моделировании физического мира
  и сохраняли строгость в их описании. Такие файлы также полезны при построении онтологии
  предметной области. Эта схема определяет нормализованную сущность комплекса с лигандом,
  связанную со структурой рецептора и пригодную для структурного анализа.

entity_definition:
  name: ligand_complex
  description: >
    Структурированное представление одного комплекса рецептора с лигандом, ингибитор-связанного
    состояния, комплекса с аналогом субстрата, комплекса с реактиватором или другого функционально
    значимого малого молекулярного взаимодействия. Одна запись может быть получена из PDB, предсказанной
    модели или другого доверенного структурного реестра. В будущем набор идентификаторов для того же
    комплекса может дополняться связанными вариантами из UniProt, AlphaFold и других реестров, где это уместно.

record_granularity:
  unit: one_ligand_complex_record
  description: >
    Одна запись соответствует одной интерпретации комплекса рецептора с лигандом. Если одна структурная запись
    содержит несколько значимых лигандов или несколько различных режимов связывания, требующих раздельного учета,
    они могут быть представлены отдельными записями ligand_complex.

naming_conventions:
  missing_value: null
  boolean_values: [true, false]
  list_format: array
  primary_id_example: "ligand_complex:4EY4_donepezil"

field_groups:
  - identity
  - receptor_link
  - ligand
  - binding
  - experiment
  - quality
  - relations
  - references
  - curation

fields:
  - name: complex_id
    type: string
    required: true
    description: Внутренний стабильный идентификатор сущности комплекса с лигандом.
    example: "ligand_complex:4EY4_donepezil"

  - name: structure_registry
    type: string
    required: true
    description: Основной реестр или система-источник, из которой получена родительская структура/модель.
    allowed_values:
      - PDB
      - UniProt
      - AlphaFold
      - ModelArchive
      - EMDB
      - Other

  - name: structure_id
    type: string
    required: true
    description: Основной идентификатор родительской структуры/модели в реестре-источнике.
    example: "4EY4"

  - name: external_ids
    type: array[object]
    required: false
    description: Кросс-реестровые идентификаторы, относящиеся к тому же комплексу или его родительской структуре.
    item_schema:
      registry: string
      id: string
      relation: string

  - name: receptor_entity_id
    type: string
    required: true
    description: Идентификатор связанной сущности receptor_structure.
    example: "receptor_structure:4EY4"

  - name: receptor_name
    type: string
    required: true
    description: Каноническое название рецептора/белка.
    example: "Acetylcholinesterase"

  - name: gene_name
    type: string
    required: false
    description: Стандартный символ гена рецептора/белка.
    example: "ACHE"

  - name: organism
    type: string
    required: true
    description: Вид-источник рецептора/белка.
    example: "Homo sapiens"

  - name: ligand_name
    type: string
    required: true
    description: Предпочтительное название связанного или ассоциированного лиганда.
    example: "Donepezil"

  - name: ligand_registry_ids
    type: array[object]
    required: false
    description: Идентификаторы лиганда в химических реестрах.
    item_schema:
      registry: string
      id: string
      relation: string
    example:
      - registry: "PDB CCD"
        id: "E20"
        relation: "bound_component"
      - registry: "PubChem"
        id: "3152"
        relation: "chemical_reference"

  - name: ligand_role
    type: string
    required: true
    description: Функциональная роль лиганда в комплексе.
    allowed_values:
      - inhibitor
      - substrate
      - substrate_analog
      - product
      - reactivator
      - cofactor
      - allosteric_modulator
      - probe
      - unknown

  - name: binding_mode
    type: string
    required: false
    description: Общий режим связывания или механистический класс.
    allowed_values:
      - covalent
      - noncovalent
      - mixed
      - transient
      - unknown

  - name: binding_site
    type: string
    required: false
    description: Основной аннотированный сайт связывания.
    allowed_values:
      - active_site
      - peripheral_site
      - allosteric_site
      - orthosteric_site
      - interface_site
      - multiple_sites
      - unknown

  - name: interacting_chains
    type: array[string]
    required: false
    description: Цепи рецептора, участвующие в распознавании лиганда.

  - name: interacting_residues
    type: array[string]
    required: false
    description: Ключевые остатки, которые указаны или вручную отмечены как участвующие в связывании.
    example: ["SER203", "HIS447", "GLU334"]

  - name: covalent_modification
    type: boolean
    required: false
    description: Образует ли лиганд ковалентный аддукт с рецептором/белком.

  - name: aged_state
    type: boolean
    required: false
    description: Находится ли ковалентно ингибированный комплекс в aged-состоянии.

  - name: affinity_type
    type: string
    required: false
    description: Тип метрики аффинности или активности, если доступна.
    allowed_values:
      - Ki
      - Kd
      - IC50
      - EC50
      - kon
      - koff
      - unknown

  - name: affinity_value
    type: number
    required: false
    description: Численное значение аффинности/активности, если доступно.

  - name: affinity_units
    type: string
    required: false
    description: Единицы измерения для значения аффинности/активности.
    example: "nM"

  - name: experimental_method
    type: string
    required: false
    description: Экспериментальный метод для родительской структуры/модели, если применимо.

  - name: resolution_angstrom
    type: number
    required: false
    units: angstrom
    description: Лучшее заявленное экспериментальное разрешение в ангстремах.

  - name: confidence_note
    type: string
    required: false
    description: Замечание о достоверности позы лиганда, аннотации или назначения сайта связывания.

  - name: related_entities
    type: array[object]
    required: false
    description: Связи данного комплекса с лигандом с другими сущностями онтологии или модели данных.
    item_schema:
      entity_type: string
      entity_id: string
      relation_type: string
      note: string
    example:
      - entity_type: "receptor_structure"
        entity_id: "receptor_structure:4EY4"
        relation_type: "derived_from_structure"
        note: "Родительская структура человеческой ACHE."

  - name: primary_reference
    type: string
    required: false
    description: DOI, PubMed ID или краткая ссылка на основную публикацию.

  - name: source_url
    type: string
    required: false
    description: Канонический URL страницы родительской структуры/модели в реестре-источнике.

  - name: notes
    type: string
    required: false
    description: Свободная заметка куратора о важных оговорках или решениях.

interpretation_rules:
  - rule: registry_scope
    text: >
      Нельзя считать, что происхождение комплекса ограничено только PDB. Комплексы могут быть связаны
      с экспериментальными структурами, предсказанными моделями или будущими интеграциями с другими реестрами.
      Основной источник фиксируется в structure_registry, а перекрестные ссылки хранятся в external_ids.

  - rule: ligand_relevance
    text: >
      В записи ligand_complex должны попадать только функционально значимые лиганды. Соли, буферы,
      криопротекторы, детергенты и другие нефункциональные добавки нужно игнорировать, если только
      они не являются явным предметом интерпретации комплекса.

  - rule: one_record_per_interpretation
    text: >
      Если структура содержит несколько значимых лигандов с разными ролями или один лиганд имеет несколько
      независимых важных интерпретаций связывания, их нужно представлять отдельными записями ligand_complex.

  - rule: interacting_residues_scope
    text: >
      Поле interacting_residues нужно трактовать как консервативный contact-oriented список остатков для данной
      интерпретации ligand_complex. Нельзя автоматически повышать все interacting_residues до каталитических или
      активных остатков. Если нужна более строгая residue-level интерпретация сайта, ее следует представлять через
      связанную сущность binding_site.

  - rule: null_handling
    text: >
      Если поле нельзя надежно определить из доверенных источников, нужно ставить null, а не угадывать.

output_template:
  format: json
  example:
    complex_id: "ligand_complex:4EY4_donepezil"
    structure_registry: "PDB"
    structure_id: "4EY4"
    external_ids:
      - registry: "PDB"
        id: "4EY4"
        relation: "parent_structure"
    receptor_entity_id: "receptor_structure:4EY4"
    receptor_name: "Acetylcholinesterase"
    gene_name: "ACHE"
    organism: "Homo sapiens"
    ligand_name: "Donepezil"
    ligand_registry_ids:
      - registry: "PubChem"
        id: "3152"
        relation: "chemical_reference"
    ligand_role: "inhibitor"
    binding_mode: "noncovalent"
    binding_site: "active_site"
    interacting_chains: ["A"]
    interacting_residues: ["SER203", "TRP86", "TYR337"]
    covalent_modification: false
    aged_state: false
    affinity_type: null
    affinity_value: null
    affinity_units: null
    experimental_method: "X-RAY DIFFRACTION"
    resolution_angstrom: 2.35
    confidence_note: "Высокая уверенность в кристаллографической позе лиганда."
    related_entities:
      - entity_type: "receptor_structure"
        entity_id: "receptor_structure:4EY4"
        relation_type: "derived_from_structure"
        note: "Родительская структура рецептора."
      - entity_type: "binding_site"
        entity_id: "binding_site:4EY4:A:active_site"
        relation_type: "maps_to_binding_site"
        note: "Комплекс сопоставлен с записью binding_site для кармана активного центра."
    primary_reference: null
    source_url: "https://www.rcsb.org/structure/4EY4"
    notes: "Комплекс человеческой ACHE с донепезилом."
